name: Build Desktop & Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (ignored if custom_version is provided)'
        required: false
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      custom_version:
        description: 'Custom version number (e.g., 2.5.0) - overrides version_type if provided'
        required: false
        type: string
      platforms:
        description: '選擇要構建的平台'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - windows
        - macos
        - linux
      skip_release:
        description: '只構建桌面應用，不進行發佈'
        required: false
        default: false
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Trigger Build Desktop Applications
      uses: actions/github-script@v7
      id: trigger_build
      with:
        script: |
          console.log('🔨 觸發桌面應用構建...');
          const result = await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'build-desktop.yml',
            ref: 'main',
            inputs: {
              platforms: '${{ github.event.inputs.platforms }}',
              upload_artifacts: 'true'
            }
          });
          console.log('✅ 桌面構建已觸發');

    - name: Wait for desktop build to complete
      uses: actions/github-script@v7
      id: wait_build
      with:
        script: |
          console.log('⏳ 等待桌面構建完成...');

          // 等待一段時間讓 workflow 開始
          await new Promise(resolve => setTimeout(resolve, 30000));

          // 查找最新的構建 run
          let attempts = 0;
          const maxAttempts = 60; // 最多等待 30 分鐘
          let buildSuccess = false;

          while (attempts < maxAttempts) {
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-desktop.yml',
              status: 'completed',
              per_page: 1
            });

            if (runs.data.workflow_runs.length > 0) {
              const latestRun = runs.data.workflow_runs[0];
              const runTime = new Date(latestRun.created_at).getTime();
              const now = Date.now();

              // 只看最近 35 分鐘內完成的 run
              if (now - runTime < 35 * 60 * 1000) {
                if (latestRun.conclusion === 'success') {
                  console.log(`✅ 桌面構建成功! Run ID: ${latestRun.id}`);
                  buildSuccess = true;
                  core.setOutput('build_run_id', latestRun.id.toString());
                  break;
                } else if (latestRun.conclusion === 'failure') {
                  core.setFailed(`❌ 桌面構建失敗! Run ID: ${latestRun.id}`);
                  return;
                }
              }
            }

            // 也檢查正在運行的
            const inProgress = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-desktop.yml',
              status: 'in_progress',
              per_page: 1
            });

            if (inProgress.data.workflow_runs.length > 0) {
              console.log(`⏳ 構建進行中... (嘗試 ${attempts + 1}/${maxAttempts})`);
            } else {
              console.log(`🔍 等待構建開始或完成... (嘗試 ${attempts + 1}/${maxAttempts})`);
            }

            await new Promise(resolve => setTimeout(resolve, 30000));
            attempts++;
          }

          if (!buildSuccess) {
            core.setFailed('❌ 等待桌面構建超時');
          }

    - name: Skip release check
      if: ${{ github.event.inputs.skip_release == 'true' }}
      run: |
        echo "⏭️ 已設置跳過發佈，僅構建桌面應用"
        echo "如需發佈，請手動觸發 Auto Release to PyPI workflow"

    - name: Trigger Auto Release to PyPI
      if: ${{ github.event.inputs.skip_release != 'true' }}
      uses: actions/github-script@v7
      with:
        script: |
          console.log('🚀 觸發 PyPI 發佈...');
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'publish.yml',
            ref: 'main',
            inputs: {
              version_type: '${{ github.event.inputs.version_type }}',
              custom_version: '${{ github.event.inputs.custom_version }}',
              include_desktop: 'true',
              desktop_build_run_id: '${{ steps.wait_build.outputs.build_run_id }}'
            }
          });
          console.log('✅ 發佈已觸發');

    - name: Generate summary
      if: always()
      run: |
        echo "## 🎯 構建和發佈摘要" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **平台**: ${{ github.event.inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
        echo "- **版本類型**: ${{ github.event.inputs.version_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **自定義版本**: ${{ github.event.inputs.custom_version || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **跳過發佈**: ${{ github.event.inputs.skip_release }}" >> $GITHUB_STEP_SUMMARY
