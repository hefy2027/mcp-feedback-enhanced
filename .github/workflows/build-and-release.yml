name: Build Desktop & Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (ignored if custom_version is provided)'
        required: false
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      custom_version:
        description: 'Custom version number (e.g., 2.5.0) - overrides version_type if provided'
        required: false
        type: string
      platforms:
        description: '選擇要構建的平台'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - windows
        - macos
        - linux
      skip_release:
        description: '只構建桌面應用，不進行發佈'
        required: false
        default: false
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Trigger Build Desktop Applications and wait
      uses: actions/github-script@v7
      id: wait_build
      with:
        script: |
          const triggerTime = Date.now();
          console.log(`🔨 觸發桌面應用構建... (trigger time: ${new Date(triggerTime).toISOString()})`);

          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'build-desktop.yml',
            ref: 'main',
            inputs: {
              platforms: '${{ github.event.inputs.platforms }}',
              upload_artifacts: 'true'
            }
          });
          console.log('✅ 桌面構建已觸發，等待 run 出現...');

          // 等 15 秒讓 workflow run 出現
          await new Promise(r => setTimeout(r, 15000));

          // 找到觸發後創建的 run（用 triggerTime 精確匹配）
          let targetRunId = null;
          for (let i = 0; i < 10; i++) {
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-desktop.yml',
              event: 'workflow_dispatch',
              per_page: 5
            });
            for (const run of runs.data.workflow_runs) {
              const created = new Date(run.created_at).getTime();
              if (created >= triggerTime - 5000) {
                targetRunId = run.id;
                console.log(`🎯 找到目標 run: ${targetRunId} (created: ${run.created_at})`);
                break;
              }
            }
            if (targetRunId) break;
            console.log(`🔍 等待 run 出現... (嘗試 ${i + 1}/10)`);
            await new Promise(r => setTimeout(r, 10000));
          }

          if (!targetRunId) {
            core.setFailed('❌ 無法找到觸發的構建 run');
            return;
          }

          // 輪詢等待該 run 完成
          const maxAttempts = 90; // 最多等 45 分鐘
          for (let i = 0; i < maxAttempts; i++) {
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: targetRunId
            });

            const status = run.data.status;
            const conclusion = run.data.conclusion;
            console.log(`⏳ Run ${targetRunId}: status=${status}, conclusion=${conclusion} (嘗試 ${i + 1}/${maxAttempts})`);

            if (status === 'completed') {
              if (conclusion === 'success') {
                console.log(`✅ 桌面構建成功! Run ID: ${targetRunId}`);
                core.setOutput('build_run_id', targetRunId.toString());
                return;
              } else {
                core.setFailed(`❌ 桌面構建失敗! Run ID: ${targetRunId}, conclusion: ${conclusion}`);
                return;
              }
            }

            await new Promise(r => setTimeout(r, 30000));
          }

          core.setFailed(`❌ 等待桌面構建超時 (Run ID: ${targetRunId})`);

    - name: Skip release check
      if: ${{ github.event.inputs.skip_release == 'true' }}
      run: |
        echo "⏭️ 已設置跳過發佈，僅構建桌面應用"
        echo "如需發佈，請手動觸發 Auto Release to PyPI workflow"

    - name: Trigger Auto Release to PyPI
      if: ${{ github.event.inputs.skip_release != 'true' }}
      uses: actions/github-script@v7
      with:
        script: |
          console.log('🚀 觸發 PyPI 發佈...');
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'publish.yml',
            ref: 'main',
            inputs: {
              version_type: '${{ github.event.inputs.version_type }}',
              custom_version: '${{ github.event.inputs.custom_version }}',
              include_desktop: 'true',
              desktop_build_run_id: '${{ steps.wait_build.outputs.build_run_id }}'
            }
          });
          console.log('✅ 發佈已觸發');

    - name: Generate summary
      if: always()
      run: |
        echo "## 🎯 構建和發佈摘要" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **平台**: ${{ github.event.inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
        echo "- **版本類型**: ${{ github.event.inputs.version_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **自定義版本**: ${{ github.event.inputs.custom_version || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **跳過發佈**: ${{ github.event.inputs.skip_release }}" >> $GITHUB_STEP_SUMMARY
